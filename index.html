<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>St. Bonifacius Weather Board</title>
  <style>
    :root {
      --card-bg: rgba(10, 18, 30, 0.48);
      --card-border: rgba(255, 255, 255, 0.22);
      --text-main: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.78);
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text-main);
      background: #0b1020;
    }

    body { position: relative; }

    .sky {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: linear-gradient(180deg, #123a6f 0%, #69a9e8 56%, #bfd8e6 100%);
      transition: background 2s ease, filter 2s ease;
    }

    .sky::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 105%, rgba(255,255,255,0.06), transparent 35%),
        linear-gradient(180deg, rgba(0,0,0,0.01), rgba(0,0,0,0.14));
      pointer-events: none;
    }

    .celestial {
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: left 2s ease, top 2s ease, opacity 2s ease, box-shadow 2s ease, background 2s ease;
      z-index: 1;
    }

    .sun {
      background: radial-gradient(circle, #fffce1 0%, #fff2a0 24%, #ffd85c 52%, #ff9f2e 100%);
      box-shadow: 0 0 95px rgba(255, 232, 120, 0.98), 0 0 210px rgba(255, 178, 55, 0.68), 0 0 330px rgba(255, 215, 90, 0.28);
      animation: celestialGlow 4s ease-in-out infinite;
    }

    .sun::before {
      content: "";
      position: absolute;
      inset: -42px;
      border-radius: 50%;
      border: 3px solid rgba(255, 236, 150, 0.22);
      box-shadow: 0 0 45px rgba(255, 228, 125, 0.22);
    }

    .sun::after {
      content: "";
      position: absolute;
      inset: -86px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 230, 115, 0.24), transparent 64%);
    }

    .moon {
      background: radial-gradient(circle at 38% 38%, #ffffff 0%, #edf4ff 42%, #a6b9e8 100%);
      box-shadow: 0 0 82px rgba(225, 236, 255, 0.82), 0 0 190px rgba(151, 177, 240, 0.42), 0 0 300px rgba(190, 210, 255, 0.22);
      animation: celestialGlow 4s ease-in-out infinite;
    }

    .moon::after {
      content: "";
      position: absolute;
      width: 122px;
      height: 122px;
      border-radius: 50%;
      background: rgba(12, 22, 42, 0.55);
      top: 10px;
      left: 42px;
    }

    @keyframes celestialGlow {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.045); }
    }

    .path-guide {
      position: absolute;
      left: 7%;
      right: 7%;
      top: 18%;
      height: 62%;
      border-top: 2px dashed rgba(255,255,255,0.16);
      border-radius: 50% 50% 0 0;
      opacity: 0.48;
      z-index: 0;
      pointer-events: none;
    }

    .clouds {
      position: absolute;
      inset: 0;
      opacity: 0.35;
      transition: opacity 1.5s ease;
      pointer-events: none;
      z-index: 3;
    }

    .cloud {
      position: absolute;
      width: 270px;
      height: 72px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.54);
      filter: blur(0.2px);
      animation: cloudMove linear infinite;
    }

    .cloud::before, .cloud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: inherit;
    }

    .cloud::before { width: 112px; height: 112px; left: 42px; top: -52px; }
    .cloud::after { width: 138px; height: 138px; left: 112px; top: -72px; }
    .cloud.one { top: 120px; left: -320px; animation-duration: 95s; transform: scale(1.05); }
    .cloud.two { top: 260px; left: -520px; animation-duration: 120s; transform: scale(0.78); opacity: 0.7; }
    .cloud.three { top: 500px; left: -460px; animation-duration: 145s; transform: scale(1.18); opacity: 0.5; }
    .cloud.four { top: 185px; left: -760px; animation-duration: 135s; transform: scale(0.92); opacity: 0.62; }
    .cloud.five { top: 610px; left: -680px; animation-duration: 165s; transform: scale(0.88); opacity: 0.48; }

    @keyframes cloudMove { from { translate: -20vw 0; } to { translate: 135vw 0; } }

    .precip-layer, .holiday-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }

    .drop {
      position: absolute;
      top: -60px;
      width: 2px;
      height: 34px;
      border-radius: 999px;
      background: rgba(215, 235, 255, 0.72);
      animation: rainFall linear infinite;
      transform: rotate(12deg);
    }

    @keyframes rainFall { to { transform: translateY(116vh) translateX(-90px) rotate(12deg); } }

    .flake {
      position: absolute;
      top: -40px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 12px rgba(255,255,255,0.38);
      animation: snowFall linear infinite;
    }

    @keyframes snowFall { to { transform: translateY(112vh) translateX(70px); } }

    .firework {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      box-shadow: 0 -38px 0 #fff, 27px -27px 0 #ffdf5a, 38px 0 0 #ff6666, 27px 27px 0 #68a7ff, 0 38px 0 #fff, -27px 27px 0 #ffdf5a, -38px 0 0 #ff6666, -27px -27px 0 #68a7ff;
      animation: burst 1.8s ease-out infinite;
      opacity: 0;
    }

    @keyframes burst {
      0% { transform: scale(0.1); opacity: 0; }
      25% { opacity: 1; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    .weather-app {
      position: relative;
      z-index: 5;
      width: 100vw;
      height: 100vh;
      padding: 40px 58px 34px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 22px;
      text-shadow: 0 3px 16px var(--shadow);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 36px;
    }

    .logo-lockup { display: flex; align-items: center; gap: 20px; min-width: 0; }

    .grumpys-logo {
      width: 122px;
      height: 122px;
      object-fit: contain;
      border-radius: 22px;
      background: rgba(255,255,255,0.92);
      padding: 7px;
      box-shadow: 0 16px 38px rgba(0,0,0,0.25);
      flex: 0 0 auto;
    }

    .brand-title {
      font-size: 48px;
      line-height: 0.95;
      font-weight: 950;
      letter-spacing: -1.6px;
      margin: 0;
      white-space: nowrap;
    }

    .location {
      margin-top: 8px;
      font-size: 22px;
      font-weight: 800;
      color: var(--text-soft);
      letter-spacing: 0.4px;
    }

    .clock { text-align: right; font-weight: 950; font-size: 44px; line-height: 1; white-space: nowrap; }
    .date { margin-top: 8px; font-size: 20px; color: var(--text-soft); font-weight: 800; white-space: nowrap; }

    .alert-banner {
      display: none;
      border: 2px solid rgba(255,255,255,0.45);
      background: rgba(135, 18, 24, 0.80);
      border-radius: 24px;
      padding: 14px 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.26);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      min-height: 78px;
    }

    .alert-banner.show {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
    }

    .alert-title { font-size: 28px; font-weight: 950; letter-spacing: -0.3px; }
    .alert-detail { margin-top: 4px; font-size: 17px; font-weight: 800; color: rgba(255,255,255,0.84); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 1220px; }
    .alert-badge { flex: 0 0 auto; padding: 11px 17px; border-radius: 999px; background: rgba(255,255,255,0.18); font-size: 17px; font-weight: 950; text-transform: uppercase; letter-spacing: 1px; }

    .main-grid {
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 30px;
      min-height: 0;
    }

    .glass-card {
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      border-radius: 32px;
      box-shadow: 0 26px 80px rgba(0,0,0,0.28);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .current-card {
      padding: 34px 40px;
      display: grid;
      grid-template-rows: auto auto auto;
      align-content: start;
      gap: 24px;
      min-height: 0;
    }

    .condition-row { display: flex; align-items: center; justify-content: space-between; gap: 18px; }
    .temp { font-size: 156px; line-height: 0.9; font-weight: 950; letter-spacing: -8px; }

    .weather-visual {
      width: 290px;
      height: 290px;
      position: relative;
      flex: 0 0 auto;
      filter: drop-shadow(0 14px 26px rgba(0,0,0,0.32));
    }

    .mini-sun, .mini-moon, .mini-cloud, .mini-rain, .mini-snow { position: absolute; }
    .mini-sun { width: 138px; height: 138px; border-radius: 50%; background: #ffd85c; left: 58px; top: 34px; box-shadow: 0 0 40px rgba(255,216,92,0.8); animation: pulseSun 3s ease-in-out infinite; }
    @keyframes pulseSun { 50% { transform: scale(1.06); } }
    .mini-moon { width: 132px; height: 132px; border-radius: 50%; background: #e8f0ff; left: 62px; top: 36px; box-shadow: 0 0 30px rgba(210,225,255,0.6); }
    .mini-moon::after { content:""; position:absolute; width:106px; height:106px; border-radius:50%; background:rgba(18,32,58,0.62); left:40px; top:7px; }
    .mini-cloud { width: 220px; height: 76px; border-radius: 999px; background: rgba(255,255,255,0.92); left: 26px; top: 124px; animation: cloudBob 3.5s ease-in-out infinite; }
    .mini-cloud::before, .mini-cloud::after { content:""; position:absolute; border-radius:50%; background:inherit; }
    .mini-cloud::before { width:102px; height:102px; left:38px; top:-52px; }
    .mini-cloud::after { width:122px; height:122px; left:104px; top:-70px; }
    @keyframes cloudBob { 50% { transform: translateY(-7px); } }
    .mini-rain { left: 76px; top: 198px; width: 10px; height: 52px; border-radius: 999px; background:#cfeaff; box-shadow: 52px 4px 0 #cfeaff, 104px -2px 0 #cfeaff; animation: miniRain 0.8s linear infinite; }
    @keyframes miniRain { to { transform: translateY(18px); opacity: 0.2; } }
    .mini-snow { left: 72px; top: 202px; width: 15px; height: 15px; border-radius:50%; background:white; box-shadow: 54px 10px 0 white, 108px 2px 0 white, 28px 52px 0 white, 88px 56px 0 white; animation: miniSnow 2s linear infinite; }
    @keyframes miniSnow { to { transform: translateY(20px); opacity: 0.25; } }

    .condition-text { font-size: 44px; font-weight: 950; letter-spacing: -0.7px; }
    .feels-like { font-size: 26px; color: var(--text-soft); font-weight: 850; margin-top: 6px; }
    .summary-line { margin-top: 12px; font-size: 25px; line-height: 1.25; font-weight: 900; color: rgba(255,255,255,0.90); }

    .stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; margin-top: 22px; }
    .stat { background: rgba(255,255,255,0.13); border: 1px solid rgba(255,255,255,0.16); border-radius: 24px; padding: 22px 24px; }
    .stat-label { font-size: 19px; color: var(--text-soft); font-weight: 900; text-transform: uppercase; letter-spacing: 1.2px; }
    .stat-value { margin-top: 8px; font-size: 37px; font-weight: 950; }

    .side-stack { display: grid; grid-template-rows: 0.82fr 1.38fr; gap: 30px; min-height: 0; }
    .hourly-card, .daily-card { padding: 24px; min-height: 0; overflow: hidden; }
    .section-title { margin: 0 0 16px; font-size: 26px; font-weight: 950; letter-spacing: -0.3px; }
    .hour-row { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 11px; }
    .hour-box { text-align: center; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15); border-radius: 21px; padding: 13px 6px 12px; min-width: 0; }
    .hour-time { font-size: 16px; font-weight: 900; color: var(--text-soft); }
    .hour-icon { font-size: 31px; margin: 7px 0 4px; }
    .hour-temp { font-size: 28px; font-weight: 950; }

    .daily-list { display: grid; grid-template-rows: repeat(5, 1fr); gap: 11px; height: calc(100% - 46px); min-height: 0; }
    .day-row { display: grid; grid-template-columns: 1.08fr 58px 1fr 74px; align-items: center; gap: 14px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15); border-radius: 21px; padding: 12px 18px; font-weight: 950; min-height: 0; }
    .day-name { font-size: 24px; }
    .day-icon { font-size: 32px; text-align: center; }
    .day-range { font-size: 27px; text-align: right; }
    .day-pop { text-align: right; font-size: 20px; color: var(--text-soft); }

    .footer { display: flex; justify-content: flex-start; align-items: center; gap: 18px; color: rgba(255,255,255,0.76); font-size: 17px; font-weight: 800; min-height: 40px; }
    .status-pill { padding: 10px 16px; border-radius: 999px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.16); }

    .loading { position: fixed; inset: 0; z-index: 20; display: grid; place-items: center; background: #07101f; color: white; font-size: 36px; font-weight: 900; transition: opacity 0.6s ease; }
    .loading.hide { opacity: 0; pointer-events: none; }

    @media (max-width: 1200px) {
      .weather-app { padding: 30px; gap: 18px; }
      .brand-title { font-size: 38px; }
      .clock { font-size: 34px; }
      .main-grid { grid-template-columns: 1fr; }
      .temp { font-size: 118px; }
      .weather-visual { width: 138px; height: 138px; }
      .condition-text { font-size: 34px; }
      .side-stack { grid-template-rows: auto auto; }
    }
  </style>
</head>
<body>
  <div class="sky" id="sky">
    <div class="path-guide" id="pathGuide"></div>
    <div class="celestial sun" id="sun"></div>
    <div class="celestial moon" id="moon"></div>
    <div class="clouds" id="clouds">
      <div class="cloud one"></div>
      <div class="cloud two"></div>
      <div class="cloud three"></div>
      <div class="cloud four"></div>
      <div class="cloud five"></div>
    </div>
  </div>

  <div class="precip-layer" id="precipLayer"></div>
  <div class="holiday-layer" id="holidayLayer"></div>
  <div class="loading" id="loading">Loading St. Bonifacius Weather…</div>

  <main class="weather-app">
    <header class="topbar">
      <div class="logo-lockup">
        <img class="grumpys-logo" src="grumpys-logo.png" alt="Grumpy’s logo" />
        <div>
          <h1 class="brand-title">Grumpy’s Weather Center</h1>
          <div class="location">St. Bonifacius, MN 55375</div>
        </div>
      </div>
      <div>
        <div class="clock" id="clock">--:--</div>
        <div class="date" id="dateText">---</div>
      </div>
    </header>

    <section class="main-grid">
      <div class="alert-banner" id="alertBanner">
        <div>
          <div class="alert-title" id="alertTitle">Weather Alert</div>
          <div class="alert-detail" id="alertDetail">No active alert details</div>
        </div>
        <div class="alert-badge" id="alertBadge">Alert</div>
      </div>
      <article class="glass-card current-card">
        <div>
          <div class="condition-row">
            <div class="temp" id="currentTemp">--°</div>
            <div class="weather-visual" id="weatherVisual" aria-label="Animated current weather"></div>
          </div>
          <div class="condition-text" id="conditionText">Loading weather</div>
          <div class="feels-like" id="feelsLike">Feels like --°</div>
          <div class="summary-line" id="summaryLine">Loading local forecast…</div>
        </div>

        <div class="stat-grid">
          <div class="stat">
            <div class="stat-label">Today</div>
            <div class="stat-value" id="highLow">--° / --°</div>
          </div>
          <div class="stat">
            <div class="stat-label">Precip Chance</div>
            <div class="stat-value" id="precipChance">--%</div>
          </div>
          <div class="stat">
            <div class="stat-label">Wind</div>
            <div class="stat-value" id="windSpeed">-- mph</div>
          </div>
          <div class="stat">
            <div class="stat-label">Sunset</div>
            <div class="stat-value" id="sunsetTime">--:--</div>
          </div>
        </div>
      </article>

      <div class="side-stack">
        <article class="glass-card hourly-card">
          <h2 class="section-title">Next 6 Hours</h2>
          <div class="hour-row" id="hourlyRow"></div>
        </article>

        <article class="glass-card daily-card">
          <h2 class="section-title">5-Day Forecast</h2>
          <div class="daily-list" id="dailyList"></div>
        </article>
      </div>
    </section>

    <footer class="footer">
      <div class="status-pill" id="lastUpdated">Updated --</div>
      
    </footer>
  </main>

  <script>
    const LATITUDE = 44.9055;
    const LONGITUDE = -93.7475;
    const TIMEZONE = "America/Chicago";
    const REFRESH_MINUTES = 10;

    const els = {
      sky: document.getElementById("sky"),
      sun: document.getElementById("sun"),
      moon: document.getElementById("moon"),
      clouds: document.getElementById("clouds"),
      precipLayer: document.getElementById("precipLayer"),
      loading: document.getElementById("loading"),
      clock: document.getElementById("clock"),
      dateText: document.getElementById("dateText"),
      currentTemp: document.getElementById("currentTemp"),
      weatherVisual: document.getElementById("weatherVisual"),
      summaryLine: document.getElementById("summaryLine"),
      conditionText: document.getElementById("conditionText"),
      feelsLike: document.getElementById("feelsLike"),
      highLow: document.getElementById("highLow"),
      precipChance: document.getElementById("precipChance"),
      windSpeed: document.getElementById("windSpeed"),
      sunsetTime: document.getElementById("sunsetTime"),
      hourlyRow: document.getElementById("hourlyRow"),
      dailyList: document.getElementById("dailyList"),
      lastUpdated: document.getElementById("lastUpdated"),
      alertBanner: document.getElementById("alertBanner"),
      alertTitle: document.getElementById("alertTitle"),
      alertDetail: document.getElementById("alertDetail"),
      alertBadge: document.getElementById("alertBadge")
    };

    let latestWeather = null;

    function formatTime(date) {
      return new Intl.DateTimeFormat("en-US", {
        timeZone: TIMEZONE,
        hour: "numeric",
        minute: "2-digit"
      }).format(date);
    }

    function formatHour(date) {
      return new Intl.DateTimeFormat("en-US", {
        timeZone: TIMEZONE,
        hour: "numeric"
      }).format(date);
    }

    function formatDay(date) {
      return new Intl.DateTimeFormat("en-US", {
        timeZone: TIMEZONE,
        weekday: "short"
      }).format(date);
    }

    function updateClock() {
      const now = new Date();
      els.clock.textContent = new Intl.DateTimeFormat("en-US", {
        timeZone: TIMEZONE,
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit"
      }).format(now);

      els.dateText.textContent = new Intl.DateTimeFormat("en-US", {
        timeZone: TIMEZONE,
        weekday: "long",
        month: "long",
        day: "numeric"
      }).format(now);

      if (latestWeather) updateSky(latestWeather);
    }

    function round(value) {
      return Math.round(Number(value));
    }

    function weatherInfo(code, isDay = 1) {
      const map = {
        0: ["Clear Sky", isDay ? "☀️" : "🌙"],
        1: ["Mainly Clear", isDay ? "🌤️" : "🌙"],
        2: ["Partly Cloudy", isDay ? "⛅" : "☁️"],
        3: ["Cloudy", "☁️"],
        45: ["Foggy", "🌫️"],
        48: ["Rime Fog", "🌫️"],
        51: ["Light Drizzle", "🌦️"],
        53: ["Drizzle", "🌦️"],
        55: ["Heavy Drizzle", "🌧️"],
        56: ["Freezing Drizzle", "🌧️"],
        57: ["Freezing Drizzle", "🌧️"],
        61: ["Light Rain", "🌧️"],
        63: ["Rain", "🌧️"],
        65: ["Heavy Rain", "🌧️"],
        66: ["Freezing Rain", "🌧️"],
        67: ["Freezing Rain", "🌧️"],
        71: ["Light Snow", "🌨️"],
        73: ["Snow", "🌨️"],
        75: ["Heavy Snow", "❄️"],
        77: ["Snow Grains", "❄️"],
        80: ["Rain Showers", "🌦️"],
        81: ["Rain Showers", "🌧️"],
        82: ["Heavy Showers", "⛈️"],
        85: ["Snow Showers", "🌨️"],
        86: ["Heavy Snow Showers", "❄️"],
        95: ["Thunderstorm", "⛈️"],
        96: ["Thunderstorm with Hail", "⛈️"],
        99: ["Thunderstorm with Hail", "⛈️"]
      };
      return map[code] || ["Weather", "🌤️"];
    }

    function isRainCode(code) {
      return [51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(Number(code));
    }

    function isSnowCode(code) {
      return [71,73,75,77,85,86].includes(Number(code));
    }

    function isCloudyCode(code) {
      return [2,3,45,48,51,53,55,56,57,61,63,65,66,67,80,81,82,85,86,95,96,99].includes(Number(code));
    }

    function setPrecipitation(type, intensity = 60) {
      els.precipLayer.innerHTML = "";
      if (!type) return;

      const count = type === "snow" ? 90 : intensity;
      for (let i = 0; i < count; i++) {
        const particle = document.createElement("div");
        particle.className = type === "snow" ? "flake" : "drop";
        particle.style.left = Math.random() * 100 + "vw";
        particle.style.animationDelay = (-Math.random() * 8) + "s";
        particle.style.animationDuration = type === "snow"
          ? (7 + Math.random() * 8) + "s"
          : (0.55 + Math.random() * 0.55) + "s";
        particle.style.opacity = type === "snow"
          ? (0.35 + Math.random() * 0.65)
          : (0.32 + Math.random() * 0.48);
        if (type === "snow") {
          const size = 5 + Math.random() * 8;
          particle.style.width = size + "px";
          particle.style.height = size + "px";
        }
        els.precipLayer.appendChild(particle);
      }
    }

    function getDayProgress(now, sunrise, sunset) {
      const start = sunrise.getTime();
      const end = sunset.getTime();
      const current = now.getTime();
      return Math.min(1, Math.max(0, (current - start) / (end - start)));
    }

    function getNightProgress(now, sunrise, sunset) {
      const current = now.getTime();
      if (current < sunrise.getTime()) return 0.78;
      if (current > sunset.getTime()) return 0.25;
      return 0;
    }

    function updateSky(data) {
      const now = new Date();
      const todaySunrise = new Date(data.daily.sunrise[0]);
      const todaySunset = new Date(data.daily.sunset[0]);
      const isDay = data.current.is_day === 1;
      const code = data.current.weather_code;
      const cloudy = isCloudyCode(code);
      const raining = isRainCode(code);
      const snowing = isSnowCode(code);

      let background;
      let filter = "brightness(1) saturate(1.08)";

      if (isDay) {
        const p = getDayProgress(now, todaySunrise, todaySunset);
        const earlyLate = Math.abs(p - 0.5) * 2;
        const sunWarmth = earlyLate > 0.66;
        background = sunWarmth
          ? "linear-gradient(180deg, #1b3f78 0%, #e79959 56%, #f6c982 100%)"
          : "linear-gradient(180deg, #1467b3 0%, #62b8f6 55%, #d6efff 100%)";
        if (cloudy) filter = "brightness(0.78) saturate(0.82)";
        if (raining) filter = "brightness(0.56) saturate(0.72)";
        if (snowing) filter = "brightness(0.86) saturate(0.65)";

        const x = 9 + p * 82;
        const y = 76 - Math.sin(p * Math.PI) * 56;
        els.sun.style.left = x + "%";
        els.sun.style.top = y + "%";
        els.sun.style.opacity = raining ? 0.44 : cloudy ? 0.62 : 1;
        els.moon.style.opacity = 0;
      } else {
        const p = getNightProgress(now, todaySunrise, todaySunset);
        background = "linear-gradient(180deg, #050817 0%, #0e1e3e 60%, #182849 100%)";
        if (cloudy) filter = "brightness(0.72) saturate(0.8)";
        if (raining) filter = "brightness(0.45) saturate(0.7)";
        if (snowing) filter = "brightness(0.68) saturate(0.65)";

        const x = 9 + p * 82;
        const y = 78 - Math.sin(p * Math.PI) * 50;
        els.moon.style.left = x + "%";
        els.moon.style.top = y + "%";
        els.moon.style.opacity = raining ? 0.46 : cloudy ? 0.66 : 0.96;
        els.sun.style.opacity = 0;
      }

      els.sky.style.background = background;
      els.sky.style.filter = filter;
      els.clouds.style.opacity = cloudy || raining || snowing ? 0.68 : 0.30;

      if (raining) setPrecipitation("rain", code >= 63 ? 110 : 70);
      else if (snowing) setPrecipitation("snow");
      else setPrecipitation(null);
    }

    function isDayAt(date, data) {
      const targetDate = new Intl.DateTimeFormat("en-CA", {
        timeZone: TIMEZONE,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(date);

      const index = data.daily.time.findIndex(day => day === targetDate);
      if (index === -1) return 1;

      const sunrise = new Date(data.daily.sunrise[index]);
      const sunset = new Date(data.daily.sunset[index]);
      return date >= sunrise && date < sunset ? 1 : 0;
    }

    function renderWeatherVisual(code, isDay) {
      const rainy = isRainCode(code);
      const snowy = isSnowCode(code);
      const cloudy = isCloudyCode(code);
      const holiday = getHolidayEffect();
      let html = "";

      if (isDay === 1 && !rainy && !snowy) html += '<div class="mini-sun"></div>';
      if (isDay !== 1 && !rainy && !snowy) html += '<div class="mini-moon"></div>';
      if (cloudy || rainy || snowy) html += '<div class="mini-cloud"></div>';
      if (rainy) html += '<div class="mini-rain"></div>';
      if (snowy) html += '<div class="mini-snow"></div>';
      if (!html) html = isDay === 1 ? '<div class="mini-sun"></div>' : '<div class="mini-moon"></div>';
      if (holiday === "fireworks") html += '<div class="firework" style="left:205px; top:72px; animation-delay:.2s"></div>';
      if (holiday === "newyear") html += '<div class="holiday-badge" style="position:absolute; right:0; top:8px; font-size:42px; filter:drop-shadow(0 8px 12px rgba(0,0,0,.35));">🎆</div>';
      if (holiday === "valentine") html += '<div class="holiday-badge" style="position:absolute; right:4px; top:10px; font-size:44px; filter:drop-shadow(0 8px 12px rgba(0,0,0,.35));">❤️</div>';
      if (holiday === "stpatricks") html += '<div class="holiday-badge" style="position:absolute; right:2px; top:12px; font-size:46px; filter:drop-shadow(0 8px 12px rgba(0,0,0,.35));">☘️</div>';
      if (holiday === "halloween") html += '<div class="holiday-badge" style="position:absolute; right:2px; top:8px; font-size:48px; filter:drop-shadow(0 8px 12px rgba(0,0,0,.35));">🎃</div>';
      if (holiday === "thanksgiving") html += '<div class="holiday-badge" style="position:absolute; right:0; top:10px; font-size:48px; filter:drop-shadow(0 8px 12px rgba(0,0,0,.35));">🦃</div>';
      if (holiday === "christmas") html += '<div class="holiday-badge" style="position:absolute; right:0; top:6px; font-size:48px; filter:drop-shadow(0 8px 12px rgba(0,0,0,.35));">🎄</div>'; 
      els.weatherVisual.innerHTML = html;
    }

    function buildSummary(condition, daily) {
      const high = round(daily.temperature_2m_max[0]);
      const rain = round(daily.precipitation_probability_max[0] ?? 0);
      if (rain >= 70) return `${condition} now • Rain likely today • High ${high}°`;
      if (rain >= 35) return `${condition} now • Chance of rain • High ${high}°`;
      return `${condition} now • High ${high}° today`;
    }

    function getHolidayEffect() {
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-US", { timeZone: TIMEZONE, month: "numeric", day: "numeric" }).formatToParts(now);
      const month = Number(parts.find(p => p.type === "month").value);
      const day = Number(parts.find(p => p.type === "day").value);
      if (month === 1 && day === 1) return "newyear";
      if (month === 2 && day === 14) return "valentine";
      if (month === 3 && day === 17) return "stpatricks";
      if (month === 7 && day === 4) return "fireworks";
      if (month === 10 && day === 31) return "halloween";
      if (month === 11 && day >= 22 && day <= 28) return "thanksgiving";
      if (month === 12 && day === 24 || month === 12 && day === 25) return "christmas";
      return null;
    }

    function renderHolidayLayer() {
      const effect = getHolidayEffect();
      const layer = document.getElementById("holidayLayer");
      if (!layer) return;
      layer.innerHTML = "";
      if (effect !== "fireworks") return;
      for (let i = 0; i < 6; i++) {
        const fw = document.createElement("div");
        fw.className = "firework";
        fw.style.left = (12 + Math.random() * 76) + "vw";
        fw.style.top = (12 + Math.random() * 32) + "vh";
        fw.style.animationDelay = (Math.random() * 2.8) + "s";
        layer.appendChild(fw);
      }
    }

    function renderWeather(data) {
      latestWeather = data;
      const current = data.current;
      const daily = data.daily;
      const hourly = data.hourly;
      const [condition, icon] = weatherInfo(current.weather_code, current.is_day);

      els.currentTemp.textContent = `${round(current.temperature_2m)}°`;
      renderWeatherVisual(current.weather_code, current.is_day);
      els.conditionText.textContent = condition;
      els.feelsLike.textContent = `Feels like ${round(current.apparent_temperature)}°`;
      els.summaryLine.textContent = buildSummary(condition, daily);
      els.highLow.textContent = `${round(daily.temperature_2m_max[0])}° / ${round(daily.temperature_2m_min[0])}°`;
      els.precipChance.textContent = `${round(daily.precipitation_probability_max[0] ?? 0)}%`;
      els.windSpeed.textContent = `${round(current.wind_speed_10m)} mph`;
      els.sunsetTime.textContent = formatTime(new Date(daily.sunset[0]));

      const now = new Date();
      const startIndex = hourly.time.findIndex(t => new Date(t) >= now);
      const safeStart = Math.max(0, startIndex);
      const nextSix = hourly.time.slice(safeStart, safeStart + 6);

      els.hourlyRow.innerHTML = nextSix.map((time, i) => {
        const idx = safeStart + i;
        const hourDate = new Date(time);
        const hourIsDay = isDayAt(hourDate, data);
        const [label, hourIcon] = weatherInfo(hourly.weather_code[idx], hourIsDay);
        return `
          <div class="hour-box" title="${label}">
            <div class="hour-time">${formatHour(hourDate)}</div>
            <div class="hour-icon">${hourIcon}</div>
            <div class="hour-temp">${round(hourly.temperature_2m[idx])}°</div>
          </div>
        `;
      }).join("");

      els.dailyList.innerHTML = daily.time.slice(0, 5).map((dateText, i) => {
        const [label, dayIcon] = weatherInfo(daily.weather_code[i], 1);
        return `
          <div class="day-row" title="${label}">
            <div class="day-name">${i === 0 ? "Today" : formatDay(new Date(dateText + "T12:00:00"))}</div>
            <div class="day-icon">${dayIcon}</div>
            <div class="day-range">${round(daily.temperature_2m_max[i])}° / ${round(daily.temperature_2m_min[i])}°</div>
            <div class="day-pop">${round(daily.precipitation_probability_max[i] ?? 0)}%</div>
          </div>
        `;
      }).join("");

      els.lastUpdated.textContent = `Updated ${formatTime(new Date())}`;
      updateSky(data);
      els.loading.classList.add("hide");
    }

    async function loadAlerts() {
      const url = `https://api.weather.gov/alerts/active?point=${LATITUDE},${LONGITUDE}`;

      try {
        const response = await fetch(url, {
          cache: "no-store",
          headers: {
            "Accept": "application/geo+json"
          }
        });
        if (!response.ok) throw new Error(`Alerts request failed: ${response.status}`);
        const data = await response.json();
        const alerts = data.features || [];

        if (!alerts.length) {
          els.alertBanner.classList.remove("show");
          return;
        }

        const priority = ["Extreme", "Severe", "Moderate", "Minor", "Unknown"];
        alerts.sort((a, b) => priority.indexOf(a.properties.severity || "Unknown") - priority.indexOf(b.properties.severity || "Unknown"));
        const alert = alerts[0].properties;

        els.alertTitle.textContent = alert.event || "Weather Alert";
        els.alertDetail.textContent = alert.headline || alert.description || "Active weather alert for the St. Bonifacius area.";
        els.alertBadge.textContent = alert.severity || "Alert";
        els.alertBanner.classList.add("show");
      } catch (error) {
        console.warn("Weather alerts could not load", error);
        els.alertBanner.classList.remove("show");
      }
    }

    async function loadWeather() {
      const params = new URLSearchParams({
        latitude: LATITUDE,
        longitude: LONGITUDE,
        current: [
          "temperature_2m",
          "apparent_temperature",
          "is_day",
          "precipitation",
          "rain",
          "snowfall",
          "weather_code",
          "wind_speed_10m"
        ].join(","),
        hourly: [
          "temperature_2m",
          "precipitation_probability",
          "weather_code"
        ].join(","),
        daily: [
          "weather_code",
          "temperature_2m_max",
          "temperature_2m_min",
          "precipitation_probability_max",
          "sunrise",
          "sunset"
        ].join(","),
        temperature_unit: "fahrenheit",
        wind_speed_unit: "mph",
        precipitation_unit: "inch",
        timezone: TIMEZONE,
        forecast_days: "7"
      });

      const url = `https://api.open-meteo.com/v1/forecast?${params.toString()}`;

      try {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error(`Weather request failed: ${response.status}`);
        const data = await response.json();
        renderWeather(data);
      } catch (error) {
        console.error(error);
        els.loading.textContent = "Weather could not load. Check internet connection.";
      }
    }

    updateClock();
    renderHolidayLayer();
    setInterval(updateClock, 1000);
    loadWeather();
    loadAlerts();
    setInterval(loadWeather, REFRESH_MINUTES * 60 * 1000);
    setInterval(loadAlerts, REFRESH_MINUTES * 60 * 1000);
  </script>
</body>
</html>
